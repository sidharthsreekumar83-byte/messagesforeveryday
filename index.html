<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Liya 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
    text-align: center;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
}

.container {
    position: relative;
    z-index: 2;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 14px;
    margin-top: 20px;
}

.box {
    padding: 20px;
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid #333;
    cursor: pointer;
    transition: 0.3s;
}

.box.locked {
    opacity: 0.4;
    cursor: not-allowed;
}

.box.opened {
    background: #ff4d6d;
    box-shadow: 0 0 20px #ff4d6d;
}

.message-card {
    margin-top: 25px;
    padding: 30px;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
    border-radius: 20px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 0 25px rgba(255,77,109,0.2);
    opacity: 0;
    transform: translateY(20px);
    transition: 0.5s;
    white-space: pre-line;
}

.message-card.show {
    opacity: 1;
    transform: translateY(0);
}

.heart {
    position: fixed;
    color: #ff4d6d;
    animation: rise 3s linear forwards;
}

@keyframes rise {
    0% {transform: translateY(0); opacity:1;}
    100% {transform: translateY(-100vh); opacity:0;}
}

@keyframes shake {
    0% {transform: translateX(0);}
    25% {transform: translateX(-6px);}
    50% {transform: translateX(6px);}
    75% {transform: translateX(-6px);}
    100% {transform: translateX(0);}
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="container">
    <h1>For You, Liya 💖</h1>
    <p>One day at a time… till April 25</p>

    <div class="grid" id="grid"></div>
    <div id="msg" class="message-card"></div>
</div>

<script>
/* 🌌 STARFIELD */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
for(let i=0;i<150;i++){
    stars.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*1.5,
        d: Math.random()*0.5
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="white";
    stars.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fill();

        s.y+=s.d;
        if(s.y>canvas.height){
            s.y=0;
            s.x=Math.random()*canvas.width;
        }
    });

    requestAnimationFrame(draw);
}
draw();

/* 💖 Heart burst */
function heartBurst(){
    for(let i=0;i<25;i++){
        let h=document.createElement("div");
        h.className="heart";
        h.innerText="❤";
        h.style.left=Math.random()*100+"vw";
        h.style.bottom="0px";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),3000);
    }
}

/* 📅 DATE FIX (IMPORTANT) */
const startDate = new Date("2026-04-19");
startDate.setHours(0,0,0,0);

const today = new Date();
today.setHours(0,0,0,0);

/* 💾 SAVE OPEN STATE */
let opened = JSON.parse(localStorage.getItem("opened") || "[]");

/* 💌 MESSAGES */
const messages = [
`I love you. Truly. And I’m sorry if I ever hurt you.`,
`You stay in my mind more than I say.`,
`I want to be someone you feel safe with.`,
`I’m learning… for you.`,
`I won’t waste a second chance.`,
`Losing you scares me.`,
`FINAL`
];

/* GRID */
const grid = document.getElementById("grid");

for(let i=0;i<7;i++){
    let box=document.createElement("div");
    box.className="box";

    let unlock = new Date(startDate);
    unlock.setDate(startDate.getDate()+i);
    unlock.setHours(0,0,0,0);

    if(today < unlock){
        box.classList.add("locked");
    }

    if(opened[i]){
        box.classList.add("opened");
    }

    box.innerText="April "+(19+i)+(today<unlock?" 🔒":"");

    box.onclick=()=>{

        if(today < unlock){
            box.style.animation="shake 0.3s";
            setTimeout(()=>box.style.animation="",300);
            return;
        }

        let msg=document.getElementById("msg");
        msg.classList.remove("show");

        setTimeout(()=>{

            if(i===6){
                heartBurst();
                msg.innerHTML = `
💖 FINAL DAY 💖

You matter to me… more than I can explain.

If there’s still a place for me in your heart,
I promise I’ll never take it for granted again.
`;
            } else {
                msg.innerText = messages[i];
            }

            msg.classList.add("show");

        },200);

        box.classList.add("opened");
        opened[i] = true;
        localStorage.setItem("opened", JSON.stringify(opened));
    };

    grid.appendChild(box);
}
</script>

</body>
</html>
