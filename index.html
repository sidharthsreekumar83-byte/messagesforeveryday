<script>
/* 🌌 STARFIELD */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
for(let i=0;i<150;i++){
    stars.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*1.5,
        d: Math.random()*0.5
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="white";
    stars.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fill();

        s.y+=s.d;
        if(s.y>canvas.height){
            s.y=0;
            s.x=Math.random()*canvas.width;
        }
    });

    requestAnimationFrame(draw);
}
draw();

/* 💖 Heart burst */
function heartBurst(){
    for(let i=0;i<25;i++){
        let h=document.createElement("div");
        h.className="heart";
        h.innerText="❤";
        h.style.left=Math.random()*100+"vw";
        h.style.bottom="0px";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),3000);
    }
}

/* 📅 FIXED DATE (IMPORTANT) */
const startDate = new Date(2026, 3, 19); // ✅ FIXED
startDate.setHours(0,0,0,0);

const today = new Date();
today.setHours(0,0,0,0);

/* 💾 SAVE OPEN STATE */
let opened = JSON.parse(localStorage.getItem("opened") || "[]");

/* 💌 YOUR ORIGINAL MESSAGES */
const messages = [
`I don’t even know how to begin this properly… but I’ll try.

I love you. Not in a casual way, not in a temporary way… but in a way where even silence reminds me of you.

If I hurt you, I’m truly sorry. That was never my intention, and I hate the thought that I made you feel anything less than special.`,

`I’ve started noticing something… you’re in my thoughts more than I admit.

Not just when I’m free, but even in the middle of everything.

And slowly I’ve realized — you matter to me in a way I can’t ignore anymore.`,

`I don’t want to be someone you doubt.

I want to be someone you feel safe with… someone who doesn’t just say things, but proves them quietly every single day.`,

`I’m not perfect, and I don’t want to pretend I am.

But I’m learning. For you. For us.

And I hope that counts for something.`,

`If I ever get a chance to fix things properly, I won’t waste it again.

Not with words this time… but with actions that stay consistent, even when nobody is watching.`,

`The thought of losing you is something I don’t want to experience again.

Because once you become important to someone, even the idea of distance feels heavy.`,

`FINAL`
];

/* GRID */
const grid = document.getElementById("grid");

for(let i=0;i<7;i++){
    let box=document.createElement("div");
    box.className="box";

    let unlock = new Date(startDate);
    unlock.setDate(startDate.getDate()+i);
    unlock.setHours(0,0,0,0);

    if(today < unlock){
        box.classList.add("locked");
    }

    if(opened[i]){
        box.classList.add("opened");
    }

    box.innerText="April "+(19+i)+(today<unlock?" 🔒":"");

    box.onclick=()=>{

        if(today < unlock){
            box.style.animation="shake 0.3s";
            setTimeout(()=>box.style.animation="",300);
            return;
        }

        let msg=document.getElementById("msg");
        msg.classList.remove("show");

        setTimeout(()=>{

            if(i===6){
                heartBurst();
                msg.innerHTML = `
💖 FINAL DAY 💖

I didn’t just want to say this…
I wanted you to feel it.

You matter. More than words. More than distance. More than silence.

If there’s still a place for me in your heart…
I’ll treat it like something I never take for granted again.
`;
            } else {
                msg.innerText = messages[i];
            }

            msg.classList.add("show");

        },200);

        box.classList.add("opened");
        opened[i] = true;
        localStorage.setItem("opened", JSON.stringify(opened));
    };

    grid.appendChild(box);
}
</script>
