<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Liya 💖</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    text-align: center;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 12px;
    margin-top: 20px;
}

.box {
    padding: 20px;
    background: #222;
    border-radius: 10px;
    cursor: pointer;
}

.box.locked {
    opacity: 0.4;
}

.box.opened {
    background: #ff4d6d;
}

.message {
    margin-top: 20px;
    padding: 20px;
    border: 1px solid #444;
    border-radius: 10px;
    white-space: pre-line;
}
</style>

</head>

<body>

<h1>For You, Liya 💖</h1>
<p>One day at a time… till April 25</p>

<div id="grid" class="grid"></div>
<div id="msg" class="message"></div>

<script>
document.addEventListener("DOMContentLoaded", function(){

const grid = document.getElementById("grid");
const msg = document.getElementById("msg");

/* DATE */
const startDate = new Date(2026, 3, 19);
startDate.setHours(0,0,0,0);

const today = new Date();
today.setHours(0,0,0,0);

/* MESSAGES */
const messages = [
"I don’t even know how to begin this properly… but I’ll try.\n\nI love you. Not in a casual way, not in a temporary way… but in a way where even silence reminds me of you.\n\nIf I hurt you, I’m truly sorry.",
"You’re in my thoughts more than I admit.",
"I want to be someone you feel safe with.",
"I’m learning. For you.",
"I won’t waste a second chance.",
"Losing you scares me.",
"💖 FINAL DAY 💖\n\nYou matter. More than words. More than distance."
];

/* CREATE BOXES */
for(let i=0;i<7;i++){

    let box=document.createElement("div");
    box.className="box";

    let unlock=new Date(startDate);
    unlock.setDate(startDate.getDate()+i);

    if(today < unlock) box.classList.add("locked");

    box.innerText="April "+(19+i);

    box.onclick=function(){
        if(today < unlock) return;

        msg.innerText = messages[i];
        box.classList.add("opened");
    };

    grid.appendChild(box);
}

});
</script>

</body>
</html>
